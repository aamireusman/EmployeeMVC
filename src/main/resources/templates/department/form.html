<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${department.id == null ? 'Add Department' : 'Edit Department'}">Department Form</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white fw-semibold">
                    <span th:text="${department.id == null ? 'Add Department' : 'Edit Department'}"></span>
                </div>
                <div class="card-body">
                    <form th:action="@{/departments/save}" th:object="${department}" method="post">
                        <input type="hidden" th:field="*{id}"/>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Department Name</label>
                            <input type="text" class="form-control" th:field="*{name}" required/>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Save</button>
                            <a th:href="@{/?view=departments}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
