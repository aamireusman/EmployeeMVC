<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${employee.id == null ? 'Add Employee' : 'Edit Employee'}">Employee Form</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white fw-semibold">
                    <span th:text="${employee.id == null ? 'Add Employee' : 'Edit Employee'}"></span>
                </div>
                <div class="card-body">
                    <form th:action="@{/employees/save}" th:object="${employee}" method="post">
                        <input type="hidden" th:field="*{id}"/>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">First Name</label>
                            <input type="text" class="form-control" th:field="*{firstName}" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Last Name</label>
                            <input type="text" class="form-control" th:field="*{lastName}" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email</label>
                            <input type="email" class="form-control" th:field="*{email}" required/>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Department</label>
                            <select class="form-select" name="departmentId" required>
                                <option value="">-- Select Department --</option>
                                <option th:each="dept : ${departments}"
                                        th:value="${dept.id}"
                                        th:text="${dept.name}"
                                        th:selected="${employee.department != null && employee.department.id == dept.id}">
                                </option>
                            </select>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Save</button>
                            <a th:href="@{/?view=employees}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
